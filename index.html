<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VT Model Demo</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: rgba(12, 18, 38, 0.85);
      --text: #e9eefc;
      --accent: #53d8fb;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: radial-gradient(circle at 20% 20%, #18284f, var(--bg) 55%);
      color: var(--text);
      overflow: hidden;
    }

    #app {
      width: 100vw;
      height: 100vh;
    }

    .hud {
      position: fixed;
      left: 16px;
      top: 16px;
      z-index: 3;
      max-width: 420px;
      background: var(--panel);
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 10px;
      padding: 12px 14px;
      backdrop-filter: blur(4px);
    }

    .hud h1 {
      margin: 0 0 8px;
      font-size: 18px;
      color: var(--accent);
    }

    .hud p {
      margin: 6px 0;
      font-size: 13px;
      line-height: 1.35;
      opacity: 0.95;
    }

    .hud button {
      border: 0;
      border-radius: 8px;
      background: #53d8fb;
      color: #081022;
      font-weight: 700;
      padding: 8px 12px;
      cursor: pointer;
    }

    .hud button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .ok { color: #8bffca; }
    .err { color: #ff9898; white-space: pre-wrap; }

    @media (max-width: 680px) {
      .hud { max-width: calc(100vw - 24px); left: 12px; top: 12px; }
    }
  </style>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/",
        "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@3.4.2/lib/three-vrm.module.js"
      }
    }
  </script>
</head>
<body>
  <div id="app"></div>
  <div class="hud">
    <h1>Sample VT Model Viewer</h1>
    <p><strong>Model:</strong> <code>/models/sample.vrm</code></p>
    <p><strong>Controls:</strong> Mouse moves eyes/head. Drag still rotates camera.</p>
    <p><button id="micBtn" type="button">Enable Mic Talk</button></p>
    <p id="micStatus">Mic: off</p>
    <p id="status">Loading model...</p>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
